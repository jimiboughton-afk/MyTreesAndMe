<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#2E4636">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>My Trees and Me</title>
<style>
/* ============================================================
   DESIGN TOKENS — Jimi's playground.
   Restyle the whole app from this block. Phase 1 ships a clean
   functional canvas; the real design pass is yours.
   ============================================================ */
:root {
  --bg:        #F6F3EB;   /* paper */
  --bg-sunken: #ECE7DA;   /* recessed panels */
  --surface:   #FFFFFF;   /* cards */
  --ink:       #26231C;   /* primary text */
  --ink-soft:  #6E6757;   /* secondary text */
  --line:      #DDD5C4;   /* hairlines */
  --green:     #2E4636;   /* deep eucalypt — header, primary */
  --green-soft:#E4EBE2;   /* tinted chips */
  --moss:      #6F8F5A;   /* accents, success */
  --bark:      #7A5C3E;   /* secondary accent */
  --amber:     #C08A2D;   /* attention */
  --danger:    #A8442F;   /* destructive */
  --radius: 14px;
  --radius-sm: 9px;
  --shadow: 0 1px 3px rgba(38,35,28,.10), 0 4px 14px rgba(38,35,28,.06);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.45;
  overscroll-behavior-y: none;
}
button { font-family: inherit; font-size: inherit; border: none; background: none; color: inherit; cursor: pointer; }
input, select, textarea {
  font-family: inherit; font-size: 16px; color: var(--ink);
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius-sm); padding: 11px 12px; width: 100%;
}
input:focus, select:focus, textarea:focus, button:focus-visible {
  outline: 2px solid var(--moss); outline-offset: 1px;
}
label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-soft); margin: 14px 0 5px; letter-spacing: .02em; }

/* ---------- App bar ---------- */
#appbar {
  position: sticky; top: 0; z-index: 40;
  background: var(--green); color: #F4F1E6;
  padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
  display: flex; align-items: center; gap: 12px;
}
#appbar h1 { font-size: 18px; font-weight: 650; letter-spacing: .01em; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.iconbtn { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 21px; flex: none; }
.iconbtn:active { background: rgba(255,255,255,.15); }

/* ---------- Drawer ---------- */
#scrim { position: fixed; inset: 0; background: rgba(20,24,18,.45); z-index: 60; opacity: 0; pointer-events: none; transition: opacity .22s; }
#scrim.open { opacity: 1; pointer-events: auto; }
#drawer {
  position: fixed; top: 0; bottom: 0; left: 0; width: min(300px, 84vw); z-index: 61;
  background: var(--bg); transform: translateX(-102%); transition: transform .24s ease;
  display: flex; flex-direction: column; box-shadow: var(--shadow);
  padding-top: env(safe-area-inset-top);
}
#drawer.open { transform: translateX(0); }
#drawer .brand { padding: 22px 20px 16px; border-bottom: 1px solid var(--line); }
#drawer .brand .t { font-size: 20px; font-weight: 700; color: var(--green); }
#drawer .brand .s { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
#drawer nav { padding: 8px 10px; flex: 1; overflow-y: auto; }
.navitem {
  display: flex; align-items: center; gap: 13px; width: 100%;
  padding: 13px 12px; border-radius: var(--radius-sm); font-size: 15.5px; font-weight: 500;
  text-align: left;
}
.navitem .ic { font-size: 19px; width: 24px; text-align: center; }
.navitem.active { background: var(--green-soft); color: var(--green); font-weight: 650; }
.navitem:active { background: var(--bg-sunken); }
#drawer .foot { padding: 12px 20px calc(env(safe-area-inset-bottom) + 14px); font-size: 11.5px; color: var(--ink-soft); border-top: 1px solid var(--line); }

/* ---------- Main / views ---------- */
#main { padding: 14px 14px calc(env(safe-area-inset-bottom) + 96px); max-width: 640px; margin: 0 auto; }
.viewtitle { font-size: 22px; font-weight: 700; margin: 6px 2px 14px; color: var(--green); }
.subtle { color: var(--ink-soft); font-size: 13.5px; }

/* ---------- Collection ---------- */
.cardgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.card {
  background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
  overflow: hidden; text-align: left; position: relative; display: flex; flex-direction: column;
}
.card:active { transform: scale(.985); }
.card .ph { width: 100%; aspect-ratio: 1 / 1.05; object-fit: cover; background: var(--bg-sunken); display: block; }
.card .noph { width: 100%; aspect-ratio: 1 / 1.05; background: var(--bg-sunken); display: flex; align-items: center; justify-content: center; font-size: 38px; color: var(--line); }
.card .body { padding: 9px 11px 11px; }
.card .nick { font-weight: 650; font-size: 15px; line-height: 1.25; }
.card .sp { font-size: 12px; color: var(--ink-soft); font-style: italic; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .meta { display: flex; align-items: center; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
.stagechip {
  font-size: 11px; font-weight: 650; padding: 3px 8px; border-radius: 999px;
  background: var(--green-soft); color: var(--green); white-space: nowrap;
}
.agechip { font-size: 11px; color: var(--ink-soft); }
.attn {
  position: absolute; top: 8px; right: 8px; min-width: 26px; height: 26px; border-radius: 999px;
  background: var(--amber); color: #fff; font-size: 14px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); padding: 0 7px;
}
.empty {
  text-align: center; padding: 56px 24px; color: var(--ink-soft);
}
.empty .big { font-size: 46px; margin-bottom: 12px; }
.empty .h { font-size: 17px; font-weight: 650; color: var(--ink); margin-bottom: 6px; }

/* ---------- Collection: organise row, groups, fun layer ---------- */
.collectorline { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 650; color: var(--bark); margin: 2px 2px 10px; }
.orgrow { display: flex; align-items: center; gap: 8px; margin: 0 0 12px; flex-wrap: wrap; }
.orgbtn { font-size: 13px; font-weight: 650; padding: 8px 14px; border-radius: 999px; background: var(--surface); border: 1px solid var(--line); }
.orgbtn:active { background: var(--green-soft); }
.orgsum { font-size: 12px; color: var(--ink-soft); flex: 1; min-width: 0; }
.grouph { font-size: 12.5px; font-weight: 700; color: var(--bark); letter-spacing: .04em; text-transform: uppercase; margin: 18px 2px 8px; display: flex; justify-content: space-between; align-items: baseline; }
.grouph span:last-child { font-weight: 600; color: var(--ink-soft); }
.cardgrid + .grouph { margin-top: 22px; }
/* Foil finishes */
.card.holo, .card.gold { border: 2px solid transparent; background-origin: border-box; background-clip: padding-box, border-box; }
.card.holo { background-image: linear-gradient(var(--surface), var(--surface)), linear-gradient(115deg, #9fd4ff, #e0b3ff, #ffe39a, #a9f0c2, #9fd4ff); background-size: 100% 100%, 320% 320%; animation: shimmer 7s linear infinite; }
.card.gold { background-image: linear-gradient(var(--surface), var(--surface)), linear-gradient(115deg, #f0cf78, #fff3c4, #d9a73e, #fff3c4, #f0cf78); background-size: 100% 100%, 320% 320%; animation: shimmer 5s linear infinite; }
@keyframes shimmer { from { background-position: 0 0, 0% 50%; } to { background-position: 0 0, 320% 50%; } }
/* Tree of the day */
.card.totd { box-shadow: 0 0 0 2px var(--amber), var(--shadow); }
.totd-ribbon { position: absolute; top: 8px; left: 8px; background: var(--amber); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px; box-shadow: var(--shadow); }
/* Pack-opening reveal */
#reveal { position: fixed; inset: 0; z-index: 80; background: rgba(20,24,18,.8); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
.flipwrap { perspective: 1100px; width: min(64vw, 250px); }
.flipinner { position: relative; width: 100%; aspect-ratio: 1 / 1.45; transform-style: preserve-3d; transition: transform .9s cubic-bezier(.2,.7,.25,1); }
.flipinner.flipped { transform: rotateY(180deg); }
.face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 16px; box-shadow: 0 12px 44px rgba(0,0,0,.45); overflow: hidden; }
.face.back { background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 56px; border: 5px solid #243A2B; }
.face.front { background: var(--surface); transform: rotateY(180deg); display: flex; flex-direction: column; }
#reveal .hint { color: #F4F1E6; font-size: 14px; font-weight: 600; }
@media (prefers-reduced-motion: reduce) {
  .card.holo, .card.gold { animation: none; }
  .flipinner { transition: none; }
}

/* ---------- Map editor ---------- */
#mapwrap { position: relative; height: 58vh; background: #20251f; border-radius: var(--radius); overflow: hidden; touch-action: none; box-shadow: var(--shadow); }
#mapstage { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
#mapstage img { display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }
#mapstage svg { position: absolute; left: 0; top: 0; pointer-events: none; }
.mtoolbar { display: flex; gap: 6px; margin: 10px 0; flex-wrap: wrap; }
.mtool { font-size: 12.5px; font-weight: 650; padding: 9px 13px; border-radius: 999px; background: var(--surface); border: 1px solid var(--line); color: var(--ink-soft); }
.mtool.active { background: var(--green); border-color: var(--green); color: #F4F1E6; }
.mtool:active { opacity: .8; }
.mhint { font-size: 12px; color: var(--ink-soft); margin: 7px 2px 0; min-height: 17px; }
.bpanel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 13px 14px; margin-top: 10px; }
.bpanel h4 { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 2px; }
.statechips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 9px; }
.schip { font-size: 12px; font-weight: 650; padding: 6px 11px; border-radius: 999px; border: 1.5px solid var(--line); color: var(--ink-soft); }
.schip.active { color: #fff; border-color: transparent; }

/* ---------- FAB ---------- */

#fab {
  position: fixed; right: 18px; bottom: calc(env(safe-area-inset-bottom) + 20px); z-index: 30;
  width: 60px; height: 60px; border-radius: 50%; background: var(--green); color: #F4F1E6;
  font-size: 30px; font-weight: 300; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(46,70,54,.4);
}
#fab:active { transform: scale(.94); }

/* ---------- Profile ---------- */
.hero { border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background: var(--surface); }
.hero img { width: 100%; aspect-ratio: 4 / 3.4; object-fit: cover; display: block; background: var(--bg-sunken); }
.hero .nophoto { width: 100%; aspect-ratio: 4 / 2.2; display: flex; align-items: center; justify-content: center; font-size: 44px; color: var(--line); background: var(--bg-sunken); }
.hero .hb { padding: 13px 15px 15px; }
.hero .nick { font-size: 21px; font-weight: 700; }
.hero .sp { font-style: italic; color: var(--ink-soft); font-size: 14px; }
.hero .chips { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
.promote { font-size: 12px; font-weight: 650; color: var(--bark); padding: 4px 9px; border: 1px solid var(--line); border-radius: 999px; }
.attn-inline { font-size: 12px; font-weight: 650; color: #fff; background: var(--amber); padding: 4px 10px; border-radius: 999px; }

.tabs { display: flex; gap: 4px; margin: 16px 0 14px; background: var(--bg-sunken); border-radius: 999px; padding: 4px; }
.tab { flex: 1; text-align: center; padding: 9px 4px; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); border-radius: 999px; }
.tab.active { background: var(--surface); color: var(--green); box-shadow: var(--shadow); }

/* Timeline */
.tl { list-style: none; }
.tl li { display: flex; gap: 12px; }
.tl .rail { display: flex; flex-direction: column; align-items: center; flex: none; width: 20px; }
.tl .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--moss); margin-top: 6px; flex: none; }
.tl .dot.work { background: var(--bark); }
.tl .dot.measure { background: var(--amber); }
.tl .dot.stage { background: var(--green); }
.tl .stem { width: 2px; flex: 1; background: var(--line); margin: 4px 0 0; }
.tl .ev { flex: 1; padding-bottom: 18px; min-width: 0; }
.tl .when { font-size: 11.5px; color: var(--ink-soft); font-weight: 600; letter-spacing: .03em; text-transform: uppercase; }
.tl .what { font-size: 15px; margin-top: 2px; overflow-wrap: break-word; }
.tl .evph { margin-top: 8px; border-radius: var(--radius-sm); width: 100%; max-width: 340px; display: block; box-shadow: var(--shadow); }
.tl .evactions { margin-top: 6px; }
.minibtn { font-size: 12px; font-weight: 600; color: var(--bark); padding: 4px 9px; border: 1px solid var(--line); border-radius: 999px; margin-right: 6px; }
.minibtn.danger { color: var(--danger); }

/* Care bar + card stat block */
.carebar { display: flex; gap: 8px; overflow-x: auto; margin: 12px 0 0; padding-bottom: 2px; }
.cchip { flex: none; display: flex; flex-direction: column; align-items: center; gap: 1px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 8px 12px; min-width: 66px; }
.cchip .ce { font-size: 17px; }
.cchip .cl { font-size: 10px; color: var(--ink-soft); font-weight: 600; letter-spacing: .02em; }
.cchip .cv { font-size: 13px; font-weight: 700; color: var(--green); }
.cchip:active { background: var(--green-soft); }
.card .stats { margin-top: 7px; border-top: 1px solid var(--line); padding-top: 5px; font-size: 11px; }
.card .srow { display: flex; justify-content: space-between; gap: 6px; padding: 2px 0; color: var(--ink-soft); }
.card .srow .sk { font-weight: 650; letter-spacing: .03em; }
.card .srow.style { color: var(--bark); font-weight: 600; }
.card .srow.care { font-variant-numeric: tabular-nums; }
.card .srow.care span { white-space: nowrap; }
.tl .dot.care { background: #5E8FB0; }

/* Timeline filters + pinned notes */
.filters { display: flex; gap: 6px; margin: 0 0 14px; overflow-x: auto; padding-bottom: 2px; }
.fchip { font-size: 12.5px; font-weight: 600; padding: 7px 13px; border-radius: 999px; background: var(--surface); border: 1px solid var(--line); color: var(--ink-soft); white-space: nowrap; flex: none; }
.fchip.active { background: var(--green); border-color: var(--green); color: #F4F1E6; }
.pinstrip { background: #FBF6E3; border: 1px solid #E8DCB4; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 14px; }
.pinstrip .ph2 { font-size: 11.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--bark); margin-bottom: 4px; }
.pinstrip .pn { font-size: 14.5px; padding: 7px 0; border-bottom: 1px dashed #E8DCB4; display: flex; gap: 10px; justify-content: space-between; align-items: flex-start; }
.pinstrip .pn:last-child { border-bottom: none; padding-bottom: 2px; }
.pinstrip .pn span:first-child { overflow-wrap: anywhere; }

/* Details list */
.dl { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.dl .row { display: flex; justify-content: space-between; gap: 14px; padding: 13px 15px; border-bottom: 1px solid var(--line); font-size: 14.5px; }
.dl .row:last-child { border-bottom: none; }
.dl .k { color: var(--ink-soft); flex: none; }
.dl .v { text-align: right; overflow-wrap: anywhere; }

/* ---------- Sheets & modals ---------- */
#sheetwrap { position: fixed; inset: 0; z-index: 70; display: none; }
#sheetwrap.open { display: block; }
#sheetwrap .shade { position: absolute; inset: 0; background: rgba(20,24,18,.45); }
#sheet {
  position: absolute; left: 0; right: 0; bottom: 0; max-height: 88vh; overflow-y: auto;
  background: var(--bg); border-radius: 20px 20px 0 0;
  padding: 10px 18px calc(env(safe-area-inset-bottom) + 22px);
  animation: up .22s ease;
}
@keyframes up { from { transform: translateY(40px); opacity: .6; } to { transform: none; opacity: 1; } }
@media (prefers-reduced-motion: reduce) { #sheet { animation: none; } #drawer, #scrim { transition: none; } }
#sheet .grip { width: 40px; height: 4px; border-radius: 4px; background: var(--line); margin: 4px auto 10px; }
#sheet h2 { font-size: 18px; font-weight: 700; color: var(--green); margin: 6px 0 2px; }
.btn {
  display: block; width: 100%; text-align: center; padding: 14px; border-radius: var(--radius-sm);
  font-weight: 650; font-size: 16px; margin-top: 16px;
  background: var(--green); color: #F4F1E6;
}
.btn.secondary { background: var(--bg-sunken); color: var(--ink); }
.btn.danger { background: var(--danger); color: #fff; }
.btn:active { opacity: .85; }
.choices { display: grid; gap: 10px; margin-top: 14px; }
.choice {
  display: flex; align-items: center; gap: 13px; background: var(--surface);
  border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 14px; text-align: left;
}
.choice .ic { font-size: 22px; width: 28px; text-align: center; flex: none; }
.choice .t { font-weight: 650; font-size: 15px; }
.choice .d { font-size: 12.5px; color: var(--ink-soft); margin-top: 1px; }
.choice:active { background: var(--green-soft); }
.checkrow { display: flex; align-items: flex-start; gap: 11px; padding: 11px 2px; border-bottom: 1px solid var(--line); font-size: 14.5px; }
.checkrow input { width: 21px; height: 21px; flex: none; margin-top: 1px; accent-color: var(--green); }
.checkrow .auto { font-size: 11px; color: var(--ink-soft); display: block; }

/* ---------- Settings / stats / generic panels ---------- */
.panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 14px; }
.panel h3 { font-size: 15px; font-weight: 700; color: var(--green); margin-bottom: 4px; }
.statgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 14px; }
.stat .n { font-size: 27px; font-weight: 750; color: var(--green); line-height: 1.1; }
.stat .l { font-size: 12px; color: var(--ink-soft); margin-top: 3px; }
.toast {
  position: fixed; left: 50%; transform: translateX(-50%);
  bottom: calc(env(safe-area-inset-bottom) + 96px); z-index: 90;
  background: var(--ink); color: var(--bg); padding: 11px 18px; border-radius: 999px;
  font-size: 14px; font-weight: 550; box-shadow: var(--shadow); max-width: 86vw; text-align: center;
}
.backlink { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; color: var(--bark); margin-bottom: 10px; padding: 6px 2px; }
</style>
</head>
<body>
<header id="appbar">
  <button class="iconbtn" id="menubtn" aria-label="Open menu">☰</button>
  <h1 id="apptitle">My Trees and Me</h1>
</header>

<div id="scrim"></div>
<aside id="drawer" aria-label="App menu">
  <div class="brand">
    <div class="t">My Trees and Me 🌿</div>
    <div class="s">A bonsai collection, honestly kept</div>
  </div>
  <nav id="drawernav"></nav>
  <div class="foot">Phase 1 · schema v1 · data lives on this device — back up regularly</div>
</aside>

<main id="main"></main>
<button id="fab" aria-label="Add">+</button>

<div id="sheetwrap"><div class="shade" id="sheetshade"></div><div id="sheet" role="dialog" aria-modal="true"></div></div>

<script>
"use strict";
/* ============================================================
   CONSTANTS & DATA DEFINITIONS
   ============================================================ */
const SCHEMA_VERSION = 2;
const DB_NAME = "my-trees-and-me";

const STAGES = [
  { id: "seedling",    name: "Seedling",    emoji: "🌱" },
  { id: "prebonsai",   name: "Pre-bonsai",  emoji: "🪴" },
  { id: "development", name: "Development", emoji: "🌿" },
  { id: "refinement",  name: "Refinement",  emoji: "✂️" },
  { id: "exhibition",  name: "Exhibition",  emoji: "🏆" }
];

/* Checklist required to ENTER each stage (spec §4.1). Items marked
   auto:true will be ticked from data in later phases; manual for now. */
const PROMOTION = {
  prebonsai: [
    { t: "Target trunk caliper set", auto: "required — set in Details" },
    { t: "In ground, grow box or oversized pot" },
    { t: "Sacrifice leader(s) running or planned" }
  ],
  development: [
    { t: "Trunk at 60%+ of target caliper", auto: "auto from maps in Phase 4" },
    { t: "Trunk line set / chopped" },
    { t: "Primary branches selected" },
    { t: "Moved to a training pot" }
  ],
  refinement: [
    { t: "Primary structure complete" },
    { t: "Building secondary/tertiary ramification" },
    { t: "In a bonsai pot" }
  ],
  exhibition: [
    { t: "Mature ramification" },
    { t: "Developed nebari" },
    { t: "Refined silhouette" }
  ]
};

const WORK_TYPES = ["Prune", "Wire", "Repot", "Defoliate", "Fertilise", "Pest/disease treatment", "Other"];
const METRICS = [
  { id: "caliper", name: "Trunk caliper", unit: "mm" },
  { id: "height", name: "Height", unit: "mm" },
  { id: "spread", name: "Canopy spread", unit: "mm" },
  { id: "internode", name: "Internode length", unit: "mm" }
];

const TREE_STYLES = ["Not styled yet", "Formal upright (Chokkan)", "Informal upright (Moyogi)",
  "Slanting (Shakan)", "Cascade (Kengai)", "Semi-cascade (Han-kengai)", "Literati (Bunjin)",
  "Windswept (Fukinagashi)", "Broom (Hokidachi)", "Twin trunk", "Clump", "Forest (Yose-ue)",
  "Root-over-rock", "Raft", "Other"];

/* Care vitals: quick:true chips one-tap log a care event; the others
   read their days-since from matching work-sheet entries. */
const CARE_DEFS = [
  { id: "water", emoji: "💧", label: "Watered",    careType: "Watered",    quick: true },
  { id: "fert",  emoji: "🌱", label: "Fertilised", careType: "Fertilised", quick: true, workType: "Fertilise" },
  { id: "mist",  emoji: "💦", label: "Misted",     careType: "Misted",     quick: true },
  { id: "repot", emoji: "🪴", label: "Repotted",   workType: "Repot" },
  { id: "prune", emoji: "✂️", label: "Pruned",     workType: "Prune" }
];

function lastCareTime(events, def) {
  let last = null;
  for (const e of events) {
    const hit = (e.type === "care" && e.careType === def.careType) ||
                (e.type === "work" && def.workType && e.workType === def.workType);
    if (hit) {
      const t = new Date(e.date).getTime();
      if (last === null || t > last) last = t;
    }
  }
  return last;
}
function agoText(ts) {
  if (!ts) return "—";
  const d = Math.floor((Date.now() - ts) / 864e5);
  if (d <= 0) return "today";
  if (d < 14) return d + "d";
  if (d < 60) return Math.round(d / 7) + "wk";
  if (d < 365) return Math.round(d / 30.4) + "mo";
  return (Math.round(d / 36.5) / 10) + "yr";
}

/* ---------- Collection extras: organising + fun layer ---------- */
const AGE_BANDS = ["0–2 yrs", "3–5 yrs", "6–10 yrs", "10+ yrs"];
function ageYears(tree) {
  const owned = tree.acquiredDate ? (Date.now() - new Date(tree.acquiredDate).getTime()) / 3.156e10 : 0;
  return owned + (Number(tree.ageAtAcquisition) || 0);
}
function ageBand(tree) {
  const y = ageYears(tree);
  return y < 3 ? AGE_BANDS[0] : y < 6 ? AGE_BANDS[1] : y < 11 ? AGE_BANDS[2] : AGE_BANDS[3];
}
function collectorTitle(trees) {
  let maxYears = 0;
  for (const t of trees) if (t.acquiredDate) {
    maxYears = Math.max(maxYears, (Date.now() - new Date(t.acquiredDate).getTime()) / 3.156e10);
  }
  const score = trees.length + Math.floor(maxYears) * 2;
  if (score >= 20) return "Forest Elder";
  if (score >= 13) return "Grove Warden";
  if (score >= 7) return "Grove Tender";
  if (score >= 3) return "Sapling Keeper";
  return "Seed Sower";
}
function treeOfTheDayId(trees) {
  if (trees.length < 2) return null;
  const seed = new Date().toISOString().slice(0, 10);
  let h = 0;
  for (const c of seed) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  const sorted = [...trees].sort((a, b) => (a.id < b.id ? -1 : 1));
  return sorted[h % sorted.length].id;
}
function bdayActive(tree) {
  if (!tree.acquiredDate) return false;
  const now = new Date();
  const acq = new Date(tree.acquiredDate);
  if (now.getFullYear() <= acq.getFullYear()) return false;
  const anniv = new Date(now.getFullYear(), acq.getMonth(), acq.getDate());
  const diff = now - anniv;
  return diff >= 0 && diff < 7 * 864e5;
}
/* Foil placeholder until Phase 6 species difficulty ratings */
const HOLO_SPECIES = /banksia|eucalypt|corymbia|casuarina|allocasuarina|melaleuca|leptospermum|kunzea|pinus|\bpine\b|juniper/i;
function cardFinish(tree) {
  if (tree.stage === "exhibition") return "gold";
  if (HOLO_SPECIES.test(tree.species || "")) return "holo";
  return "";
}

/* ============================================================
   INDEXEDDB LAYER  (spec §5, §6 — schema versioned from day one)
   ============================================================ */
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, SCHEMA_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains("trees")) {
        d.createObjectStore("trees", { keyPath: "id" });
      }
      if (!d.objectStoreNames.contains("photos")) {
        const p = d.createObjectStore("photos", { keyPath: "id" });
        p.createIndex("treeId", "treeId");
      }
      if (!d.objectStoreNames.contains("events")) {
        const ev = d.createObjectStore("events", { keyPath: "id" });
        ev.createIndex("treeId", "treeId");
      }
      if (!d.objectStoreNames.contains("settings")) {
        d.createObjectStore("settings", { keyPath: "key" });
      }
      /* schema v2: versioned tree maps */
      if (!d.objectStoreNames.contains("maps")) {
        const mp = d.createObjectStore("maps", { keyPath: "id" });
        mp.createIndex("treeId", "treeId");
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function tx(store, mode, fn) {
  return new Promise((resolve, reject) => {
    const t = db.transaction(store, mode);
    const s = t.objectStore(store);
    const out = fn(s);
    t.oncomplete = () => resolve(out && out.result !== undefined ? out.result : undefined);
    t.onerror = () => reject(t.error);
  });
}
function dbPut(store, obj) { return tx(store, "readwrite", s => s.put(obj)); }
function dbDelete(store, key) { return tx(store, "readwrite", s => s.delete(key)); }
function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    const r = db.transaction(store).objectStore(store).get(key);
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}
function dbAll(store, indexName, key) {
  return new Promise((resolve, reject) => {
    const s = db.transaction(store).objectStore(store);
    const src = indexName ? s.index(indexName) : s;
    const r = key !== undefined ? src.getAll(key) : src.getAll();
    r.onsuccess = () => resolve(r.result || []);
    r.onerror = () => reject(r.error);
  });
}
function dbClear(store) { return tx(store, "readwrite", s => s.clear()); }

async function getSetting(key, fallback) {
  const row = await dbGet("settings", key);
  return row ? row.value : fallback;
}
function setSetting(key, value) { return dbPut("settings", { key, value }); }

const $ = (sel) => document.querySelector(sel);
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });
}
function todayISO() { return new Date().toISOString().slice(0, 10); }

function ageText(tree) {
  if (!tree.acquiredDate) return "";
  const yearsOwned = (Date.now() - new Date(tree.acquiredDate).getTime()) / 3.156e10;
  const total = yearsOwned + (Number(tree.ageAtAcquisition) || 0);
  if (total < 1) return "under a year old";
  return "~" + Math.round(total) + " yr" + (Math.round(total) === 1 ? "" : "s") + " old";
}

function stageOf(tree) { return STAGES.find(s => s.id === tree.stage) || STAGES[0]; }
function nextStageOf(tree) {
  const i = STAGES.findIndex(s => s.id === tree.stage);
  return i >= 0 && i < STAGES.length - 1 ? STAGES[i + 1] : null;
}

let toastTimer = null;
function toast(msg) {
  document.querySelectorAll(".toast").forEach(t => t.remove());
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.remove(), 2600);
}

/* Photo compression: longest edge 1280px, JPEG ~0.82 (spec §5 ~300KB) */
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        const MAX = 1280;
        let { width: w, height: h } = img;
        if (w > MAX || h > MAX) {
          const r = Math.min(MAX / w, MAX / h);
          w = Math.round(w * r); h = Math.round(h * r);
        }
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        c.toBlob(b => {
          URL.revokeObjectURL(url);
          b ? resolve(b) : reject(new Error("Could not process that image."));
        }, "image/jpeg", 0.82);
      } catch (err) { URL.revokeObjectURL(url); reject(err); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Could not read that image.")); };
    img.src = url;
  });
}

/* Object URL cache so timeline scrolling doesn't leak memory */
const urlCache = new Map();
function photoURL(photo) {
  if (!photo) return null;
  if (!urlCache.has(photo.id)) urlCache.set(photo.id, URL.createObjectURL(photo.blob));
  return urlCache.get(photo.id);
}

/* Needs-attention: stale photo logic (spec §4.1, decision #3) */
async function attentionInfo(tree, events) {
  const staleWeeks = await getSetting("staleWeeks", 4);
  const photoEvents = events.filter(e => e.type === "photo");
  const last = photoEvents.length ? Math.max(...photoEvents.map(e => new Date(e.date).getTime())) : null;
  const snooze = tree.snoozeUntil ? new Date(tree.snoozeUntil).getTime() : 0;
  if (Date.now() < snooze) return null;
  const limit = staleWeeks * 7 * 864e5;
  if (last === null) {
    if (Date.now() - new Date(tree.createdAt || tree.acquiredDate || 0).getTime() > limit) {
      return { reason: "No photos yet — add the first one" };
    }
    return null;
  }
  if (Date.now() - last > limit) {
    const wks = Math.floor((Date.now() - last) / (7 * 864e5));
    return { reason: "Last photo " + wks + " week" + (wks === 1 ? "" : "s") + " ago" };
  }
  return null;
}

/* ============================================================
   COLLECTION VIEW  (spec §4.1)
   ============================================================ */
async function renderCollection(main) {
  $("#apptitle").textContent = "My Trees and Me";
  const trees = await dbAll("trees");
  if (!trees.length) {
    main.innerHTML =
      '<div class="empty"><div class="big">🌱</div>' +
      '<div class="h">Your collection starts here</div>' +
      "<div>Add your first tree with the + button.<br>Every photo, cut and note from today<br>becomes its history.</div></div>";
    return;
  }
  const allEvents = await dbAll("events");
  const org = Object.assign(
    { groupBy: "none", sort: "activity", stages: [], species: [], styles: [], attnOnly: false },
    await getSetting("organise", {}));

  /* Precompute per-tree events, attention, and last activity */
  const evByTree = {}, attnByTree = {}, lastActivity = {};
  for (const t of trees) evByTree[t.id] = [];
  for (const e of allEvents) {
    if (!evByTree[e.treeId]) continue;
    evByTree[e.treeId].push(e);
    const ts = new Date(e.date).getTime();
    if (!lastActivity[e.treeId] || ts > lastActivity[e.treeId]) lastActivity[e.treeId] = ts;
  }
  for (const t of trees) attnByTree[t.id] = await attentionInfo(t, evByTree[t.id]);

  /* Collector title */
  main.insertAdjacentHTML("beforeend",
    '<div class="collectorline">🏅 ' + collectorTitle(trees) + " · " + trees.length +
    " tree" + (trees.length === 1 ? "" : "s") + "</div>");

  /* Organise row */
  const activeBits = [];
  if (org.groupBy !== "none") activeBits.push("grouped by " + org.groupBy);
  if (org.sort !== "activity") activeBits.push("sorted by " + ({ name: "name", oldest: "oldest", youngest: "youngest" }[org.sort] || org.sort));
  if (org.stages.length || org.species.length || org.styles.length || org.attnOnly) activeBits.push("filtered");
  const row = document.createElement("div");
  row.className = "orgrow";
  row.innerHTML = '<button class="orgbtn" id="orgbtn">⚙︎ Organise</button>' +
    '<span class="orgsum">' + esc(activeBits.join(" · ")) + "</span>" +
    (activeBits.length ? '<button class="minibtn" id="orgclear">Clear</button>' : "");
  main.appendChild(row);
  row.querySelector("#orgbtn").addEventListener("click", () => organiseSheet(trees, org));
  if (activeBits.length) row.querySelector("#orgclear").addEventListener("click", async () => {
    await setSetting("organise", { groupBy: "none", sort: "activity", stages: [], species: [], styles: [], attnOnly: false });
    render();
  });

  /* Filter */
  let shown = trees.filter(t =>
    (!org.stages.length || org.stages.includes(t.stage)) &&
    (!org.species.length || org.species.includes(t.species || "Species unknown")) &&
    (!org.styles.length || org.styles.includes((t.style && t.style !== "Not styled yet") ? t.style : "Not styled yet")) &&
    (!org.attnOnly || attnByTree[t.id]));

  /* Sort */
  if (org.sort === "name") shown.sort((a, b) => a.nickname.localeCompare(b.nickname));
  else if (org.sort === "oldest") shown.sort((a, b) => ageYears(b) - ageYears(a));
  else if (org.sort === "youngest") shown.sort((a, b) => ageYears(a) - ageYears(b));
  else shown.sort((a, b) => (lastActivity[b.id] || 0) - (lastActivity[a.id] || 0));

  if (!shown.length) {
    main.insertAdjacentHTML("beforeend",
      '<div class="empty"><div class="big">🔍</div><div class="h">No trees match</div><div>Loosen the filters in Organise.</div></div>');
    return;
  }

  const totd = treeOfTheDayId(trees);

  /* Group */
  let groups;
  if (org.groupBy === "none") groups = [[null, shown]];
  else {
    const keyOf = t =>
      org.groupBy === "species" ? (t.species || "Species unknown") :
      org.groupBy === "stage" ? stageOf(t).emoji + " " + stageOf(t).name :
      org.groupBy === "style" ? ((t.style && t.style !== "Not styled yet") ? t.style.replace(/\s*\(.*\)$/, "") : "Not styled yet") :
      ageBand(t);
    const map = new Map();
    for (const t of shown) {
      const k = keyOf(t);
      if (!map.has(k)) map.set(k, []);
      map.get(k).push(t);
    }
    groups = [...map.entries()];
    if (org.groupBy === "stage") {
      const order = STAGES.map(s => s.emoji + " " + s.name);
      groups.sort((a, b) => order.indexOf(a[0]) - order.indexOf(b[0]));
    } else if (org.groupBy === "age") {
      groups.sort((a, b) => AGE_BANDS.indexOf(a[0]) - AGE_BANDS.indexOf(b[0]));
    } else {
      groups.sort((a, b) => a[0].localeCompare(b[0]));
    }
  }

  for (const [label, list] of groups) {
    if (label) main.insertAdjacentHTML("beforeend",
      '<div class="grouph"><span>' + esc(label) + "</span><span>" + list.length + "</span></div>");
    const grid = document.createElement("div");
    grid.className = "cardgrid";
    main.appendChild(grid);
    for (const tree of list) {
      grid.appendChild(await makeCard(tree, evByTree[tree.id], attnByTree[tree.id], totd));
    }
  }
}

/* ---------- A single collection card ---------- */
async function makeCard(tree, events, attn, totd) {
    const stage = stageOf(tree);
    const hero = tree.heroPhotoId ? await dbGet("photos", tree.heroPhotoId) : null;
    const styleShort = tree.style && tree.style !== "Not styled yet" ? tree.style.replace(/\s*\(.*\)$/, "") : null;
    const careHTML = ["water", "fert", "repot", "prune"].map(id => {
      const def = CARE_DEFS.find(d => d.id === id);
      return "<span>" + def.emoji + " " + agoText(lastCareTime(events, def)) + "</span>";
    }).join("");
    const btn = document.createElement("button");
    const finish = cardFinish(tree);
    btn.className = "card" + (finish ? " " + finish : "") + (tree.id === totd ? " totd" : "");
    btn.innerHTML =
      (hero ? '<img class="ph" alt="" src="' + photoURL(hero) + '">' : '<div class="noph">🌳</div>') +
      (tree.id === totd ? '<span class="totd-ribbon">🌞 Tree of the day</span>' : "") +
      (attn ? '<span class="attn" title="' + esc(attn.reason) + '">!</span>' : "") +
      '<div class="body"><div class="nick">' + esc(tree.nickname) + (bdayActive(tree) ? " 🎂" : "") + "</div>" +
      '<div class="sp">' + esc(tree.species || "Species unknown") + "</div>" +
      '<div class="stats">' +
      '<div class="srow"><span class="sk">' + stage.emoji + " " + stage.name + "</span><span>" + esc(ageText(tree) || "age —") + "</span></div>" +
      (styleShort ? '<div class="srow style"><span class="sk">Style</span><span>' + esc(styleShort) + "</span></div>" : "") +
      '<div class="srow care">' + careHTML + "</div>" +
      "</div></div>";
    btn.addEventListener("click", () => go("profile", tree.id));
    return btn;
}

/* ---------- Organise sheet (group / sort / filter, persisted) ---------- */

  const styleList = [...new Set(trees.map(t => (t.style && t.style !== "Not styled yet") ? t.style : "Not styled yet"))].sort();
  const opt = (v, l, cur) => '<option value="' + v + '"' + (cur === v ? " selected" : "") + ">" + l + "</option>";
  sheet("<h2>Organise the collection</h2>" +
    '<label for="o-group">Group by</label><select id="o-group">' +
    opt("none", "None", org.groupBy) + opt("species", "Species", org.groupBy) +
    opt("stage", "Stage", org.groupBy) + opt("style", "Style", org.groupBy) +
    opt("age", "Age band", org.groupBy) + "</select>" +
    '<label for="o-sort">Sort</label><select id="o-sort">' +

/* ---------- Tree birthdays (auto timeline entries) ---------- */
async function checkBirthdays() {
  const trees = await dbAll("trees");
  const now = new Date();
  for (const t of trees) {
    if (!t.acquiredDate) continue;
    const acq = new Date(t.acquiredDate);
    const years = now.getFullYear() - acq.getFullYear();
    if (years < 1) continue;
    const anniv = new Date(now.getFullYear(), acq.getMonth(), acq.getDate());
    if (anniv > now) continue;
    const evs = await dbAll("events", "treeId", t.id);
    if (evs.some(e => e.type === "bday" && e.year === now.getFullYear())) continue;
    await dbPut("events", {
      id: uid(), treeId: t.id, date: anniv.toISOString(), type: "bday",
      year: now.getFullYear(),
      body: years + " year" + (years === 1 ? "" : "s") + " together"
    });
  }
}

      '<div class="empty"><div class="big">📈</div>' +
      '<div class="h">Coming in Phase 4</div>' +
      "<div>Growth charts arrive here. Maps and measurements<br>you make now become its raw material.</div></div>";

/* ---------- Timeline ---------- */
async function renderTimeline(el, tree, events) {
  if (!events.length) {
    el.innerHTML = '<div class="empty"><div class="big">📖</div><div class="h">A blank journal</div><div>Use the + button to log the first photo or note.</div></div>';
    return;
  }

  /* Pinned notes — the "Remember" strip, visible regardless of filter */
  const pinned = events.filter(e => e.type === "note" && e.pinned);
  if (pinned.length) {
    const strip = document.createElement("div");
    strip.className = "pinstrip";
    strip.innerHTML = '<div class="ph2">📌 Remember</div>';
    for (const p of pinned) {
      const row = document.createElement("div");
      row.className = "pn";
      const txt = document.createElement("span");
      txt.textContent = p.body;
      const un = document.createElement("button");
      un.className = "minibtn";
      un.textContent = "Unpin";
      un.addEventListener("click", async () => {
        p.pinned = false;
        await dbPut("events", p);
        toast("Unpinned");
        render();
      });
      row.appendChild(txt);
      row.appendChild(un);
      strip.appendChild(row);
    }
    el.appendChild(strip);
  }

  /* Filter chips */
  const FILTERS = [["all", "All"], ["photo", "Photos"], ["note", "Notes"], ["care", "Care"], ["work", "Work"], ["measurement", "Measurements"]];
  const bar = document.createElement("div");
  bar.className = "filters";
  for (const [id, label] of FILTERS) {
    const c = document.createElement("button");
    c.className = "fchip" + (state.tlFilter === id ? " active" : "");
    c.textContent = label;
    c.addEventListener("click", () => { state.tlFilter = id; render(); });
    bar.appendChild(c);
  }
  el.appendChild(bar);

  if (state.tlFilter !== "all") events = events.filter(e => e.type === state.tlFilter);
  if (!events.length) {
    const none = document.createElement("p");
    none.className = "subtle";
    none.style.padding = "6px 2px";
    none.textContent = "Nothing of that type logged yet.";
    el.appendChild(none);
    return;
  }

  /* In the All view, collapse consecutive runs of the same care type
     so daily watering doesn't drown the journal. The Care filter
     shows (and lets you delete) every individual entry. */
  let items = events;
  if (state.tlFilter === "all") {
    items = [];
    for (const e of events) {
      const prev = items[items.length - 1];
      if (e.type === "care" && prev && prev.type === "care" && prev.careType === e.careType) {
        prev._count = (prev._count || 1) + 1;
        prev._oldest = e.date;
      } else {
        items.push(Object.assign({}, e));
      }
    }
  }

  const ul = document.createElement("ul");
  ul.className = "tl";
  for (let i = 0; i < items.length; i++) {
    const e = items[i];
    const li = document.createElement("li");
    const dotClass = e.type === "work" ? "work" : e.type === "measurement" ? "measure" : e.type === "stage" ? "stage" : e.type === "care" ? "care" : "";
    let what = "";
    if (e.type === "photo") what = esc(e.body || "Photo added");
    else if (e.type === "note") what = esc(e.body);
    else if (e.type === "work") what = "<strong>" + esc(e.workType || "Work") + "</strong>" + (e.body ? " — " + esc(e.body) : "");
    else if (e.type === "measurement") {
      const m = METRICS.find(m => m.id === e.metric);
      what = "<strong>" + esc(m ? m.name : e.metric) + ":</strong> " + esc(e.value) + " " + (m ? m.unit : "") +
        (e.source === "map" ? ' <span class="subtle">· from map</span>' : "");
    }
    else if (e.type === "care") {
      const def = CARE_DEFS.find(d => d.careType === e.careType);
      what = "<strong>" + (def ? def.emoji + " " : "") + esc(e.careType) + "</strong>" +
        (e._count ? " ×" + e._count + ' <span class="subtle">since ' + fmtDate(e._oldest) + "</span>" : "");
    }
    else if (e.type === "bday") what = "<strong>🎂 " + esc(e.body) + "</strong>";
    else if (e.type === "stage") what = "<strong>" + esc(e.body) + "</strong> 🎉";
    li.innerHTML =
      '<div class="rail"><div class="dot ' + dotClass + '"></div>' + (i < items.length - 1 ? '<div class="stem"></div>' : "") + "</div>" +
      '<div class="ev"><div class="when">' + fmtDate(e.date) + "</div>" +
      '<div class="what">' + what + "</div></div>";
    const evBody = li.querySelector(".ev");
    if (e.type === "photo" && e.photoId) {
      const photo = await dbGet("photos", e.photoId);
      if (photo) {
        const img = document.createElement("img");
        img.className = "evph";
        img.alt = "Tree photo";
        img.src = photoURL(photo);
        evBody.appendChild(img);
        const actions = document.createElement("div");
        actions.className = "evactions";
        const heroBtn = document.createElement("button");
        heroBtn.className = "minibtn";
        heroBtn.textContent = tree.heroPhotoId === photo.id ? "★ Card photo" : "Make card photo";
        heroBtn.addEventListener("click", async () => {
          tree.heroPhotoId = photo.id;
          await dbPut("trees", tree);
          toast("Card photo updated");
          render();
        });
        actions.appendChild(heroBtn);
        evBody.appendChild(actions);
      }
    }
    /* pin + delete controls (collapsed care runs manage entries via the Care filter) */
    if (!e._count) {
      const actions2 = document.createElement("div");
      actions2.className = "evactions";
      if (e.type === "note") {
        const pin = document.createElement("button");
        pin.className = "minibtn";
        pin.textContent = e.pinned ? "📌 Pinned" : "Pin to Remember";
        pin.addEventListener("click", async () => {
          e.pinned = !e.pinned;
          await dbPut("events", e);
          toast(e.pinned ? "Pinned — it'll sit at the top of the timeline" : "Unpinned");
          render();
        });
        actions2.appendChild(pin);
      }
      const del = document.createElement("button");
      del.className = "minibtn danger";
      del.textContent = "Delete";
      del.addEventListener("click", () => confirmSheet(
        "Delete this entry?",
        e.type === "photo" ? "The photo will be removed from " + tree.nickname + "'s history too." : "This can't be undone.",
        async () => {
          await dbDelete("events", e.id);
          if (e.type === "photo" && e.photoId) {
            await dbDelete("photos", e.photoId);
            urlCache.delete(e.photoId);
            if (tree.heroPhotoId === e.photoId) { tree.heroPhotoId = null; await dbPut("trees", tree); }
          }
          toast("Entry deleted");
          render();
        }));
      actions2.appendChild(del);
      evBody.appendChild(actions2);
    }
    ul.appendChild(li);
  }
  el.appendChild(ul);
}

/* ---------- Details tab ---------- */
function renderDetails(el, tree) {
  const rows = [
    ["Species", tree.species || "—"],
    ["Bonsai style", tree.style || "Not styled yet"],
    ["Acquired", fmtDate(tree.acquiredDate)],
    ["Age estimate", ageText(tree) || "—"],
    ["Target caliper", tree.targetCaliper ? tree.targetCaliper + " mm" : "Not set"],
    ["Source", tree.source || "—"],
    ["Pot history", tree.potHistory || "—"],
    ["Soil mix", tree.soilMix || "—"],
    ["Notes", tree.notes || "—"]
  ];
  el.innerHTML = '<div class="dl">' + rows.map(([k, v]) =>
    '<div class="row"><span class="k">' + k + '</span><span class="v">' + esc(v) + "</span></div>").join("") + "</div>" +
    '<button class="btn secondary" id="editdetails">Edit details</button>' +
    '<button class="btn danger" id="deltree">Remove ' + esc(tree.nickname) + " from collection</button>";
  el.querySelector("#editdetails").addEventListener("click", () => editDetailsSheet(tree));
  el.querySelector("#deltree").addEventListener("click", () => confirmSheet(
    "Remove " + tree.nickname + "?",
    "Its entire history — photos, notes, everything — will be deleted from this device. There is no undo.",
    async () => {
      const evs = await dbAll("events", "treeId", tree.id);
      for (const e of evs) await dbDelete("events", e.id);
      const phs = await dbAll("photos", "treeId", tree.id);
      for (const p of phs) { await dbDelete("photos", p.id); urlCache.delete(p.id); }
      const mps = await dbAll("maps", "treeId", tree.id);
      for (const m of mps) await dbDelete("maps", m.id);
      await dbDelete("trees", tree.id);
      toast(tree.nickname + " removed");
      go("collection");
    }));
}

}

/* ---------- Stage promotion (spec §4.1) ---------- */
function promoteSheet(tree, next) {
  const items = PROMOTION[next.id] || [];

  sheet("<h2>Promote to " + next.emoji + " " + next.name + "?</h2>" +

      '<label class="checkrow"><input type="checkbox" data-chk="' + i + '"><span>' + esc(it.t) +

    "</div>" +
    (needsTarget ? '<label for="pr-target">Target trunk caliper (mm) — required for Pre-bonsai</label><input id="pr-target" type="number" min="1" placeholder="e.g. 80">' : "") +
    '<button class="btn" id="pr-go">Promote 🎉</button>' +

/* ---------- Stale-photo responses (decision #3) ---------- */
function staleSheet(tree) {
  sheet("<h2>" + esc(tree.nickname) + " needs an update</h2>" +
    '<p class="subtle">No recent photo. What\u2019s the story?</p>' +
    '<div class="choices">' +
    '<button class="choice" data-st="update"><span class="ic">📷</span><span><span class="t">Update now</span><span class="d">Add a fresh photo</span></span></button>' +
    '<button class="choice" data-st="nochange"><span class="ic">😴</span><span><span class="t">No change</span><span class="d">Quiet for 3 weeks</span></span></button>' +
    '<button class="choice" data-st="dormant"><span class="ic">❄️</span><span><span class="t">Dormant</span><span class="d">Quiet until spring (1 Sep)</span></span></button>' +
    "</div>",
    (el) => {
      el.querySelectorAll("[data-st]").forEach(b => b.addEventListener("click", async () => {
        const v = b.getAttribute("data-st");
        if (v === "update") { photoSheet(tree); return; }
        if (v === "nochange") {
          tree.snoozeUntil = new Date(Date.now() + 21 * 864e5).toISOString();
        } else {
          const now = new Date();
          let spring = new Date(now.getFullYear(), 8, 1); /* 1 Sep — Canberra spring */
          if (spring <= now) spring = new Date(now.getFullYear() + 1, 8, 1);
          tree.snoozeUntil = spring.toISOString();
        }
        await dbPut("trees", tree);
        closeSheet();
        toast(v === "dormant" ? "Sleeping until spring ❄️" : "Snoozed for 3 weeks");
        render();
      }));
    });
}


/* ============================================================
   MAP TAB & EDITOR  (spec §4.4 — Phase 2, increment 1)
   ============================================================ */
const STATE_COLORS = { develop: "#6F8F5A", hold: "#8B8678", shorten: "#C08A2D", remove: "#A8442F", wired: "#7A5C3E" };
const BRANCH_STATES = [["develop", "Develop"], ["hold", "Hold"], ["shorten", "Shorten"], ["remove", "Remove"], ["wired", "Wired"]];
let M = null; /* live editor session */

async function renderMapTab(body, tree) {
  const maps = (await dbAll("maps", "treeId", tree.id)).sort((a, b) => b.version - a.version);
  const photos = (await dbAll("photos", "treeId", tree.id)).sort((a, b) => new Date(b.date) - new Date(a.date));
  if (!photos.length) {
    body.innerHTML = '<div class="empty"><div class="big">🗺️</div><div class="h">A map needs a photo</div>' +
      "<div>Add a photo to the timeline first — leafless,<br>plain background, whole tree in frame.</div></div>";
    return;
  }
  let html = '<button class="btn" id="newmap" style="margin-top:0">➕ New map' + (maps.length ? " (v" + (maps[0].version + 1) + ")" : "") + "</button>";
  if (maps.length) {
    html += '<div class="choices" style="margin-top:12px">' + maps.map(m =>
      '<button class="choice" data-map="' + m.id + '"><span class="ic">🗺️</span><span><span class="t">Map v' + m.version + "</span>" +
      '<span class="d">' + m.branches.length + " branch" + (m.branches.length === 1 ? "" : "es") + " · " +
      (m.buds || []).length + " buds · " + fmtDate(m.date) + "</span></span></button>").join("") + "</div>";
  } else {
    html += '<p class="subtle" style="margin-top:12px">Trace the trunk first, then branches off it. Every saved map is a dated edition — remap each season and flip between versions to watch the structure evolve.</p>';
  }
  body.innerHTML = html;
  body.querySelector("#newmap").addEventListener("click", () => choosePhotoSheet(tree, photos, maps));
  body.querySelectorAll("[data-map]").forEach(b => b.addEventListener("click", async () => {
    const map = await dbGet("maps", b.getAttribute("data-map"));
    if (map) openMapEditor(tree, map, false);
  }));
}

function choosePhotoSheet(tree, photos, maps) {
  sheet("<h2>Pick the base photo</h2><p class='subtle'>Leafless and plain-background traces best.</p>" +
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px">' +
    photos.slice(0, 15).map(p =>
      '<img data-ph="' + p.id + '" src="' + photoURL(p) + '" alt="" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px">').join("") +
    "</div>" + '<button class="btn secondary" id="cp-cancel">Cancel</button>',
    (el) => {
      el.querySelector("#cp-cancel").addEventListener("click", closeSheet);
      el.querySelectorAll("[data-ph]").forEach(img => img.addEventListener("click", () => {
        const map = {
          id: uid(), treeId: tree.id, version: maps.length ? maps[0].version + 1 : 1,
          date: new Date().toISOString(), basePhotoId: img.getAttribute("data-ph"),
          calibration: null, branches: [], buds: []
        };

        openMapEditor(tree, map, true);
      }));
    });
}

function openMapEditor(tree, map, isNew) {
  M = {
    tree, map: JSON.parse(JSON.stringify(map)), isNew: !!isNew, dirty: !!isNew,
    mode: "branch", active: null, selected: null,
    s: 1, fit: 1, tx: 0, ty: 0, natW: 0, natH: 0, ptrs: new Map(), moved: 0,
    hist: [], histIdx: 0, ptRedo: []
  };
  state.view = "mapedit";
  render();
}

function exitMapEditor() {
  const treeId = M.tree.id;
  M = null;
  state.view = "profile";
  state.treeId = treeId;
  state.tab = "map";
  render();
}

async function renderMapEditor(main) {
  if (!M) { go("collection"); return; }
  $("#apptitle").textContent = "Map v" + M.map.version + " · " + M.tree.nickname;
  const photo = await dbGet("photos", M.map.basePhotoId);
  if (!photo) { toast("Base photo is missing"); exitMapEditor(); return; }

  main.innerHTML =
    '<div class="orgrow" style="margin-bottom:6px">' +
    '<button class="minibtn" id="m-back">← Back</button><span class="orgsum"></span>' +
    '<button class="orgbtn" id="m-save">💾 Save map</button></div>' +
    '<div class="mtoolbar">' +
    '<button class="mtool" data-mode="pan">✋ Pan</button>' +
    '<button class="mtool" data-mode="branch">🌿 Branch</button>' +
    '<button class="mtool" data-mode="bud">🟡 Bud</button>' +
    '<button class="mtool" data-mode="select">👆 Select</button>' +
    '<button class="mtool" data-mode="cal">📏 Calibrate</button>' +
    '<button class="mtool" id="m-work">🪚 Work</button>' +
    '<button class="mtool" id="m-undo">↩ Undo</button>' +
    '<button class="mtool" id="m-redo">↪ Redo</button>' +
    '<button class="mtool" id="m-end" style="display:none">✔ End branch</button>' +
    "</div>" +
    '<div id="mapwrap"><div id="mapstage"><img id="m-img" alt="">' +
    '<svg id="m-svg" xmlns="http://www.w3.org/2000/svg"></svg></div></div>' +
    '<div class="mhint" id="m-hint"></div><div id="m-bpanel"></div>';

  const wrap = $("#mapwrap"), stage = $("#mapstage"), img = $("#m-img"), svg = $("#m-svg");

  const setTransform = () => { stage.style.transform = "translate(" + M.tx + "px," + M.ty + "px) scale(" + M.s + ")"; };
  const hint = (t) => { $("#m-hint").textContent = t; };
  const modeHints = {
    pan: "Drag to move, pinch to zoom.",
    branch: M.map.branches.length ? "Tap an existing branch to start a new one growing from it." : "Tap the base of the trunk to start tracing.",
    bud: "Tap to mark buds — they drive pruning predictions later.",
    select: "Tap a branch to label or tag it; tap a bud to remove it.",
    cal: "Tap BOTH ends of something with a known width — the pot rim is perfect — then enter its real size."
  };

  /* ----- chronological undo/redo history (all tools share one stack) ----- */
  function snap() {
    return JSON.stringify({ branches: M.map.branches, buds: M.map.buds || [],
      calibration: M.map.calibration || null, calPts: M.map.calPts || [] });
  }
  function updateHistBtns() {
    const u = $("#m-undo"), r = $("#m-redo");
    if (u) u.style.opacity = (M.active && M.active.points.length) || M.histIdx > 0 ? "1" : ".4";
    if (r) r.style.opacity = (M.active && M.ptRedo.length) || M.histIdx < M.hist.length - 1 ? "1" : ".4";
  }
  function pushHist() {
    M.hist = M.hist.slice(0, M.histIdx + 1);
    M.hist.push(snap());
    M.histIdx = M.hist.length - 1;
    M.dirty = true;
    updateHistBtns();
  }
  function restoreHist(i) {
    const s = JSON.parse(M.hist[i]);
    M.map.branches = s.branches;
    M.map.buds = s.buds;
    M.map.calibration = s.calibration;
    M.map.calPts = s.calPts;
    M.histIdx = i;
    M.dirty = true;
    M.selected = null;
    renderBranchPanel();
    redraw();
    updateHistBtns();
  }

  function redraw() {
    let out = "";
    for (const b of M.map.branches) {
      const pts = b.points.map(p => p.x + "," + p.y).join(" ");
      const w = b.thickness || (b.parentId ? 5 : 9);
      if (b.id === M.selected) out += '<polyline points="' + pts + '" fill="none" stroke="#FFFFFF" stroke-width="' + (w + 5) + '" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>';
      out += '<polyline points="' + pts + '" fill="none" stroke="' + (STATE_COLORS[b.state] || STATE_COLORS.develop) + '" stroke-width="' + w + '" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>';
    }
    if (M.active) {
      const pts = M.active.points.map(p => p.x + "," + p.y).join(" ");
      if (M.active.points.length > 1) out += '<polyline points="' + pts + '" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-dasharray="10 8" stroke-linecap="round"/>';
      for (const p of M.active.points) out += '<circle cx="' + p.x + '" cy="' + p.y + '" r="7" fill="#FFFFFF" opacity="0.9"/>';
    }
    for (const bud of (M.map.buds || [])) {
      out += '<circle cx="' + bud.x + '" cy="' + bud.y + '" r="8" fill="#F2C744" stroke="#FFFFFF" stroke-width="3"/>';
    }
    const cp = M.map.calPts || [];
    if (cp.length === 2) out += '<line x1="' + cp[0].x + '" y1="' + cp[0].y + '" x2="' + cp[1].x + '" y2="' + cp[1].y + '" stroke="#56C1E8" stroke-width="4" stroke-dasharray="12 8"/>';
    for (const p of cp) out += '<circle cx="' + p.x + '" cy="' + p.y + '" r="7" fill="#56C1E8" stroke="#FFFFFF" stroke-width="2.5"/>';
    svg.innerHTML = out;
  }

  function distToSeg(p, a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const L2 = dx * dx + dy * dy;
    let t = L2 ? ((p.x - a.x) * dx + (p.y - a.y) * dy) / L2 : 0;
    t = Math.max(0, Math.min(1, t));
    const q = { x: a.x + t * dx, y: a.y + t * dy };
    return { d: Math.hypot(p.x - q.x, p.y - q.y), q };
  }
  function nearestOnBranches(p, thresh) {
    let best = null;
    for (const b of M.map.branches) {
      for (let i = 0; i < b.points.length - 1; i++) {
        const r = distToSeg(p, b.points[i], b.points[i + 1]);
        if (r.d < thresh && (!best || r.d < best.d)) best = { d: r.d, pt: r.q, branchId: b.id };
      }
    }
    return best;
  }

  function commitActive() {
    if (!M.active) return;
    if (M.active.points.length >= 2) {
      M.map.branches.push(M.active);
      M.active = null;
      M.ptRedo = [];
      pushHist();
      hint((M.map.branches.length === 1 ? "Trunk" : "Branch") + " saved — " + M.map.branches.length + " traced.");
    } else {
      hint("Branch discarded — it needs at least two points.");
      M.active = null;
      M.ptRedo = [];
    }
    $("#m-end").style.display = "none";
    redraw();
    updateHistBtns();
  }

  function setMode(mode) {
    if (M.active) commitActive();
    M.mode = mode;
    M.selected = null;
    renderBranchPanel();
    main.querySelectorAll("[data-mode]").forEach(b =>
      b.classList.toggle("active", b.getAttribute("data-mode") === mode));
    hint(modeHints[mode]);
    redraw();
  }

  function imgPt(e) {
    const r = wrap.getBoundingClientRect();
    return { x: (e.clientX - r.left - M.tx) / M.s, y: (e.clientY - r.top - M.ty) / M.s };
  }

  function handleTap(e) {
    const p = imgPt(e);
    if (p.x < 0 || p.y < 0 || p.x > M.natW || p.y > M.natH) return;
    if (M.mode === "branch") {
      if (!M.active) {
        if (!M.map.branches.length) {
          M.active = { id: uid(), parentId: null, points: [p], state: "develop", label: "Trunk" };
          M.ptRedo = [];
          hint("Trunk started — keep tapping up the trunk line, then ✔ End branch.");
        } else {
          const near = nearestOnBranches(p, 32 / M.s);
          if (!near) { hint("Start a branch by tapping ON the trunk or a parent branch."); return; }
          M.active = { id: uid(), parentId: near.branchId, points: [near.pt], state: "develop", label: "" };
          M.ptRedo = [];
          hint("Branch started — tap along it, then ✔ End branch.");
        }
        $("#m-end").style.display = "";
      } else {
        M.active.points.push(p);
        M.ptRedo = [];
      }
      redraw();
      updateHistBtns();
    } else if (M.mode === "bud") {
      M.map.buds = M.map.buds || [];
      M.map.buds.push({ id: uid(), x: p.x, y: p.y });
      pushHist();
      redraw();
    } else if (M.mode === "cal") {
      M.map.calPts = (M.map.calPts && M.map.calPts.length < 2) ? M.map.calPts : [];
      M.map.calPts.push(p);
      M.dirty = true;
      if (M.map.calPts.length === 2) calibrateSheet();
      redraw();
    } else if (M.mode === "select") {
      const buds = M.map.buds || [];
      for (let i = buds.length - 1; i >= 0; i--) {
        if (Math.hypot(p.x - buds[i].x, p.y - buds[i].y) < 24 / M.s) {
          buds.splice(i, 1);
          pushHist();
          hint("Bud removed.");
          redraw();
          return;
        }
      }
      const near = nearestOnBranches(p, 28 / M.s);
      M.selected = near ? near.branchId : null;
      renderBranchPanel();
      redraw();
    }
  }

  function renderBranchPanel() {
    const panel = $("#m-bpanel");
    if (!M.selected) { panel.innerHTML = ""; return; }
    const b = M.map.branches.find(x => x.id === M.selected);
    if (!b) { panel.innerHTML = ""; return; }
    panel.innerHTML = '<div class="bpanel"><h4>' + (b.parentId ? "Branch" : "Trunk") + "</h4>" +
      '<label for="b-label" style="margin-top:8px">Label</label>' +
      '<input id="b-label" maxlength="40" placeholder="e.g. First branch left, sacrifice leader" value="' + esc(b.label || "") + '">' +
      '<label style="margin-top:10px">Thickness <span class="subtle" id="b-thick-val"></span></label>' +
      '<input id="b-thick" type="range" min="2" max="90" step="1" value="' + (b.thickness || (b.parentId ? 5 : 9)) + '">' +
      '<div class="statechips">' + BRANCH_STATES.map(([id, name]) =>
        '<button class="schip' + (b.state === id ? " active" : "") + '" data-state="' + id + '"' +
        (b.state === id ? ' style="background:' + STATE_COLORS[id] + '"' : "") + ">" + name + "</button>").join("") + "</div>" +
      '<div style="display:flex;gap:8px;margin-top:12px">' +
      '<button class="minibtn danger" id="b-del">Delete branch</button>' +
      '<button class="minibtn" id="b-done">Done</button></div></div>';
    panel.querySelector("#b-label").addEventListener("input", (ev) => { b.label = ev.target.value; M.dirty = true; });
    panel.querySelector("#b-label").addEventListener("change", () => pushHist());
    const thickVal = () => {
      const px = b.thickness || (b.parentId ? 5 : 9);
      const mm = M.map.calibration && M.map.calibration.mmPerPx ? " ≈ " + (px * M.map.calibration.mmPerPx).toFixed(1) + " mm" : " (calibrate for mm)";
      panel.querySelector("#b-thick-val").textContent = px + " px" + mm;
    };
    thickVal();
    panel.querySelector("#b-thick").addEventListener("input", (ev) => {
      b.thickness = Number(ev.target.value);
      M.dirty = true;
      thickVal();
      redraw();
    });
    panel.querySelector("#b-thick").addEventListener("change", () => pushHist());
    panel.querySelectorAll("[data-state]").forEach(c => c.addEventListener("click", () => {
      b.state = c.getAttribute("data-state");
      pushHist();
      renderBranchPanel();
      redraw();
    }));
    panel.querySelector("#b-del").addEventListener("click", () => {
      if (M.map.branches.some(x => x.parentId === b.id)) { toast("Delete its child branches first"); return; }
      M.map.branches = M.map.branches.filter(x => x.id !== b.id);
      M.selected = null;
      pushHist();
      renderBranchPanel();
      redraw();
    });
    panel.querySelector("#b-done").addEventListener("click", () => { M.selected = null; renderBranchPanel(); redraw(); });
  }

  /* ----- calibration ----- */
  function calibrateSheet() {
    const [pa, pb] = M.map.calPts;
    const px = Math.hypot(pb.x - pa.x, pb.y - pa.y);
    sheet("<h2>📏 Set the scale</h2>" +
      '<p class="subtle">How long is that line in real life? Pot rim width is the classic ruler.</p>' +
      '<label for="cal-mm">Real distance (mm)</label><input id="cal-mm" type="number" min="1" inputmode="decimal" placeholder="e.g. 240">' +
      '<button class="btn" id="cal-save">Set scale</button>' +
      '<button class="btn secondary" id="cal-cancel">Cancel</button>',
      (el) => {
        el.querySelector("#cal-cancel").addEventListener("click", () => {
          M.map.calPts = [];
          closeSheet();
          redraw();
        });
        el.querySelector("#cal-save").addEventListener("click", () => {
          const mm = Number(el.querySelector("#cal-mm").value);
          if (!mm) { toast("Enter the distance in mm"); return; }
          M.map.calibration = { mmPerPx: mm / px };
          pushHist();
          closeSheet();
          hint("Scale set — thicknesses and measurements now read in real mm.");
          redraw();
        });
      });
  }

  /* ----- work mode: bench checklist from tagged branches ----- */
  function removeCascade(id) {
    const kids = M.map.branches.filter(b => b.parentId === id);
    for (const k of kids) removeCascade(k.id);
    M.map.branches = M.map.branches.filter(b => b.id !== id);
  }
  function workModeSheet(actionable) {
    sheet("<h2>🪚 Work mode</h2>" +
      '<p class="subtle">Tick each job as you do it at the bench, then log. Logged removals come off the map (children too); shortened branches reset to Develop.</p>' +
      actionable.map(b => '<label class="checkrow"><input type="checkbox" data-job="' + b.id + '"><span><strong>' +
        ({ shorten: "Shorten", remove: "Remove", wired: "Check wire" })[b.state] + "</strong> — " +
        esc(b.label || "unnamed branch") + "</span></label>").join("") +
      '<button class="btn" id="wm-log">Log ticked work</button>' +
      '<button class="btn secondary" id="wm-cancel">Cancel</button>',
      (el) => {
        el.querySelector("#wm-cancel").addEventListener("click", closeSheet);
        el.querySelector("#wm-log").addEventListener("click", async () => {
          const ids = [...el.querySelectorAll("[data-job]")].filter(c => c.checked).map(c => c.getAttribute("data-job"));
          if (!ids.length) { toast("Nothing ticked yet"); return; }
          for (const id of ids) {
            const b = M.map.branches.find(x => x.id === id);
            if (!b) continue;
            const verb = b.state === "remove" ? "Removed" : b.state === "shorten" ? "Shortened" : "Checked wire on";
            await dbPut("events", {
              id: uid(), treeId: M.tree.id, date: new Date().toISOString(), type: "work",
              workType: b.state === "wired" ? "Wire" : "Prune",
              body: verb + " " + (b.label ? "'" + b.label + "'" : "a branch") + " — map v" + M.map.version
            });
            if (b.state === "remove") removeCascade(b.id);
            else if (b.state === "shorten") b.state = "develop";
          }
          pushHist();
          await dbPut("maps", M.map);
          closeSheet();
          toast("Work logged to the timeline 🪚");
          redraw();
        });
      });
  }

  /* ----- pointer gestures: one-finger pan, pinch zoom, tap = tool ----- */
  wrap.addEventListener("pointerdown", (e) => {
    wrap.setPointerCapture(e.pointerId);
    M.ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (M.ptrs.size === 1) M.moved = 0;
  });
  wrap.addEventListener("pointermove", (e) => {
    if (!M.ptrs.has(e.pointerId)) return;
    const prev = M.ptrs.get(e.pointerId);
    const cur = { x: e.clientX, y: e.clientY };
    if (M.ptrs.size === 1) {
      M.tx += cur.x - prev.x;
      M.ty += cur.y - prev.y;
      M.moved += Math.hypot(cur.x - prev.x, cur.y - prev.y);
      M.ptrs.set(e.pointerId, cur);
      setTransform();
    } else if (M.ptrs.size === 2) {
      const ids = [...M.ptrs.keys()];
      const other = M.ptrs.get(ids[0] === e.pointerId ? ids[1] : ids[0]);
      const oldD = Math.hypot(prev.x - other.x, prev.y - other.y) || 1;
      const newD = Math.hypot(cur.x - other.x, cur.y - other.y) || 1;
      const r = wrap.getBoundingClientRect();
      const mid = { x: (cur.x + other.x) / 2 - r.left, y: (cur.y + other.y) / 2 - r.top };
      const ns = Math.min(Math.max(M.s * (newD / oldD), M.fit * 0.5), M.fit * 16);
      const f = ns / M.s;
      M.tx = mid.x - f * (mid.x - M.tx);
      M.ty = mid.y - f * (mid.y - M.ty);
      M.s = ns;
      M.moved += 10;
      M.ptrs.set(e.pointerId, cur);
      setTransform();
    }
  });
  const up = (e) => {
    if (!M.ptrs.has(e.pointerId)) return;
    M.ptrs.delete(e.pointerId);
    if (M.ptrs.size === 0 && M.moved < 7) handleTap(e);
  };
  wrap.addEventListener("pointerup", up);
  wrap.addEventListener("pointercancel", (e) => M.ptrs.delete(e.pointerId));

  /* ----- toolbar + save/back ----- */
  main.querySelectorAll("[data-mode]").forEach(b =>
    b.addEventListener("click", () => setMode(b.getAttribute("data-mode"))));
  $("#m-end").addEventListener("click", commitActive);
  $("#m-work").addEventListener("click", () => {
    const actionable = M.map.branches.filter(b => ["shorten", "remove", "wired"].includes(b.state));
    if (!actionable.length) { toast("Tag branches Shorten / Remove / Wired first (Select tool)"); return; }
    workModeSheet(actionable);
  });
  $("#m-undo").addEventListener("click", () => {
    if (M.active && M.active.points.length) {
      M.ptRedo.push(M.active.points.pop());
      if (!M.active.points.length) { M.active = null; $("#m-end").style.display = "none"; hint(modeHints.branch); }
      redraw();
      updateHistBtns();
      return;
    }
    if (M.histIdx > 0) { restoreHist(M.histIdx - 1); hint("Undone."); }
    else hint("Nothing to undo.");
  });
  $("#m-redo").addEventListener("click", () => {
    if (M.active && M.ptRedo.length) {
      M.active.points.push(M.ptRedo.pop());
      redraw();
      updateHistBtns();
      return;
    }
    if (M.histIdx < M.hist.length - 1) { restoreHist(M.histIdx + 1); hint("Redone."); }
    else hint("Nothing to redo.");
  });
  $("#m-save").addEventListener("click", async () => {
    if (M.active) commitActive();
    if (!M.map.branches.length) { toast("Trace the trunk before saving"); return; }
    await dbPut("maps", M.map);
    /* Calibrated maps auto-feed the measurement log (spec §4.5) */
    if (M.map.calibration && M.map.calibration.mmPerPx) {
      const mmPerPx = M.map.calibration.mmPerPx;
      const evs = await dbAll("events", "treeId", M.tree.id);
      const upsert = async (metric, value) => {
        const ex = evs.find(e => e.type === "measurement" && e.mapId === M.map.id && e.metric === metric);
        if (ex) { ex.value = value; ex.date = new Date().toISOString(); await dbPut("events", ex); }
        else await dbPut("events", { id: uid(), treeId: M.tree.id, date: new Date().toISOString(),
          type: "measurement", metric, value, mapId: M.map.id, source: "map" });
      };
      const trunk = M.map.branches.find(b => !b.parentId);
      if (trunk) await upsert("caliper", Math.round((trunk.thickness || 9) * mmPerPx));
      let minY = Infinity, maxY = -Infinity;
      for (const b of M.map.branches) for (const p of b.points) { if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y; }
      if (isFinite(minY) && maxY > minY) await upsert("height", Math.round((maxY - minY) * mmPerPx));
    }
    toast("Map v" + M.map.version + " saved 🗺️");
    exitMapEditor();
  });
  $("#m-back").addEventListener("click", () => {
    if (M.dirty) {
      confirmSheet("Leave without saving?", "This map's unsaved tracing will be lost.", exitMapEditor);
    } else {
      exitMapEditor();
    }
  });

  /* ----- load image, fit to frame ----- */
  img.onload = () => {
    M.natW = img.naturalWidth;
    M.natH = img.naturalHeight;
    img.style.width = M.natW + "px";
    img.style.height = M.natH + "px";
    svg.setAttribute("width", M.natW);
    svg.setAttribute("height", M.natH);
    svg.setAttribute("viewBox", "0 0 " + M.natW + " " + M.natH);
    const r = wrap.getBoundingClientRect();
    M.fit = Math.min(r.width / M.natW, r.height / M.natH);
    M.s = M.fit;
    M.tx = (r.width - M.natW * M.s) / 2;
    M.ty = (r.height - M.natH * M.s) / 2;
    setTransform();
    redraw();
  };
  img.src = photoURL(photo);
  M.hist = [snap()];
  M.histIdx = 0;
  M.ptRedo = [];
  setMode(M.mode);
  updateHistBtns();
}

/* ============================================================
   BACKUP & RESTORE  (spec §6 — non-negotiable)
   ============================================================ */
function blobToB64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(",")[1]);
    r.onerror = () => reject(new Error("Could not read photo for backup"));
    r.readAsDataURL(blob);
  });
}
function b64ToBlob(b64, mime) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime || "image/jpeg" });
}

async function renderBackup(main) {
  $("#apptitle").textContent = "Backup & Restore";
  const last = await getSetting("lastBackup", null);
  const trees = await dbAll("trees");
  const photos = await dbAll("photos");
  main.innerHTML = '<div class="viewtitle">Backup &amp; Restore</div>' +
    '<div class="panel"><h3>Back up everything</h3>' +
    '<p class="subtle">Saves your whole collection — ' + trees.length + " tree" + (trees.length === 1 ? "" : "s") + ", " +
    photos.length + " photo" + (photos.length === 1 ? "" : "s") + ", every note — into one file. " +
    "Share it to Drive or anywhere safe. A dropped phone should never cost you your trees\u2019 history.</p>" +
    '<p class="subtle" style="margin-top:8px">Last backup: <strong>' + (last ? fmtDate(last) : "never") + "</strong></p>" +
    '<button class="btn" id="bk-export">Export backup file</button></div>' +
    '<div class="panel"><h3>Restore from a backup</h3>' +
    '<p class="subtle">Replaces everything on this device with the backup\u2019s contents.</p>' +
    '<input id="bk-file" type="file" accept=".json,application/json" style="display:none">' +
    '<button class="btn secondary" id="bk-import">Choose backup file</button></div>';

  $("#bk-export").addEventListener("click", async () => {
    const btn = $("#bk-export");
    btn.textContent = "Packing…"; btn.disabled = true;
    try {
      const out = {
        app: "my-trees-and-me",
        schemaVersion: SCHEMA_VERSION,
        exportedAt: new Date().toISOString(),
        trees: await dbAll("trees"),
        events: await dbAll("events"),
        maps: await dbAll("maps"),
        settings: await dbAll("settings"),
        photos: []
      };
      for (const p of await dbAll("photos")) {
        out.photos.push({ id: p.id, treeId: p.treeId, date: p.date, type: p.type, b64: await blobToB64(p.blob) });
      }
      const blob = new Blob([JSON.stringify(out)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "my-trees-and-me-backup-" + todayISO() + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 30000);
      await setSetting("lastBackup", new Date().toISOString());
      toast("Backup file created — now share it somewhere safe");
      render();
    } catch (err) {
      toast("Backup failed: " + (err.message || "unknown error"));
      btn.textContent = "Export backup file"; btn.disabled = false;
    }
  });

  $("#bk-import").addEventListener("click", () => $("#bk-file").click());
  $("#bk-file").addEventListener("change", () => {
    const f = $("#bk-file").files[0];
    if (!f) return;
    confirmSheet("Restore from " + f.name + "?",
      "Everything currently in the app will be replaced by the backup. This can't be undone.",
      async () => {
        try {
          const data = JSON.parse(await f.text());
          if (data.app !== "my-trees-and-me") throw new Error("That isn't a My Trees and Me backup file.");
          if (data.schemaVersion > SCHEMA_VERSION) throw new Error("That backup is from a newer app version. Update the app first.");
          /* Future: schema migrations branch here on data.schemaVersion */
          await dbClear("trees"); await dbClear("events"); await dbClear("photos"); await dbClear("settings"); await dbClear("maps");
          urlCache.clear();
          for (const t of data.trees || []) await dbPut("trees", t);
          for (const m of data.maps || []) await dbPut("maps", m);
          for (const e of data.events || []) await dbPut("events", e);
          for (const s of data.settings || []) await dbPut("settings", s);
          for (const p of data.photos || []) {
            await dbPut("photos", { id: p.id, treeId: p.treeId, date: p.date, type: p.type || "standard", blob: b64ToBlob(p.b64) });
          }
          toast("Collection restored 🌿");
          go("collection");
        } catch (err) {
          toast(err.message || "That file couldn't be restored");
        }
      });
  });
}

/* ============================================================
   BACKUP NAG  (spec §6 — gentle, 30 days)
   ============================================================ */
async function backupNag() {
  const trees = await dbAll("trees");
  if (!trees.length) return;
  const last = await getSetting("lastBackup", null);
  const lastNag = await getSetting("lastBackupNag", null);
  const stale = !last || Date.now() - new Date(last).getTime() > 30 * 864e5;
  const nagOK = !lastNag || Date.now() - new Date(lastNag).getTime() > 7 * 864e5;
  if (stale && nagOK) {
    await setSetting("lastBackupNag", new Date().toISOString());
    setTimeout(() => toast(last ? "It's been a month since your last backup 💾" : "Your collection has no backup yet 💾"), 1200);
  }
}
